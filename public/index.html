<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f2a66" />

    <!-- ✅ Favicon and App Icons -->
    <!-- NOTE: Put your logo file inside /public/images/ and keep this filename the same -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%PUBLIC_URL%/images/springfield_golden_tulip_academy-removebg-preview.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="48x48"
      href="%PUBLIC_URL%/images/springfield_golden_tulip_academy-removebg-preview.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="%PUBLIC_URL%/images/springfield_golden_tulip_academy-removebg-preview.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%PUBLIC_URL%/images/springfield_golden_tulip_academy-removebg-preview.png"
    />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ✅ SEO Meta Tags (Springfield Golden Tulip Academy) -->
    <meta
      name="title"
      content="Springfield Golden Tulip Academy – Journey to Excellence"
    />
    <meta
      name="description"
      content="Springfield Golden Tulip Academy is a nurturing, safe and inspiring school focused on academic excellence, strong values, and character formation. Explore our curriculum, admissions, news and gallery."
    />
    <meta
      name="keywords"
      content="Springfield Golden Tulip Academy, Springfield School, Golden Tulip Academy, School in Nigeria, Nursery, Primary, Secondary, Admissions, Curriculum, Quality Education, Character Formation"
    />
    <meta name="author" content="Springfield Golden Tulip Academy" />

    <!-- ✅ Open Graph Meta (Social Sharing) -->
    <meta
      property="og:title"
      content="Springfield Golden Tulip Academy – Journey to Excellence"
    />
    <meta
      property="og:description"
      content="A nurturing learning environment where academics, discipline, and character formation come together. View admissions, news, and our school gallery."
    />
    <meta
      property="og:image"
      content="%PUBLIC_URL%/images/springfield_golden_tulip_academy-removebg-preview.png"
    />
    <meta property="og:url" content="https://www.springfieldgoldentulipacademy.com.ng" />
    <meta property="og:type" content="website" />

    <!-- ✅ Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Springfield Golden Tulip Academy – Journey to Excellence"
    />
    <meta
      name="twitter:description"
      content="Explore Springfield Golden Tulip Academy: curriculum, admissions, news and gallery. Building confident learners with strong values."
    />
    <meta
      name="twitter:image"
      content="%PUBLIC_URL%/images/springfield_golden_tulip_academy-removebg-preview.png"
    />

    <title>Springfield Golden Tulip Academy</title>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
